services:
  postgres:
    image: postgres:16
    container_name: ai_career_assistant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_career_assistant_db
      POSTGRES_USER: ai_career_user
      POSTGRES_PASSWORD: ai_career_password
    ports:
      - "5435:5432"
    volumes:
      - ai_career_postgres_data:/var/lib/postgresql/data

volumes:
  ai_career_postgres_data: